{% extends 'base.html' %}

{% block content %}
<style>
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
    }

    .login-card {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
    }

    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-header h2 {
        color: var(--accent);
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .btn-full {
        width: 100%;
        margin-top: 1rem;
    }

    .register-link {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
    }

    .register-link a {
        color: var(--accent);
        text-decoration: none;
        transition: color 0.3s;
    }

    .register-link a:hover {
        color: var(--accent-dim);
        text-decoration: underline;
    }
</style>

<div class="login-container">
    <div class="dark-card login-card">
        <div class="login-header">
            <h2><i class="fa-solid fa-user"></i> User Login</h2>
        </div>
        
        <form action="{% url 'UserLoginCheck' %}" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="loginid">Login ID</label>
                <input type="text" name="loginid" id="loginid" class="form-control" required placeholder="Enter login ID">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" required placeholder="Enter password">
            </div>
            
            <button type="submit" class="btn-primary btn-full">Login</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="{% url 'register' %}">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
