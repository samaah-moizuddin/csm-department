version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threatforge-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT:-5432}
      - COGNITOFORGE_GEMINI_API_KEY=${COGNITOFORGE_GEMINI_API_KEY}
      - COGNITOFORGE_USE_GEMINI=${COGNITOFORGE_USE_GEMINI:-false}
      - COGNITOFORGE_GITHUB_TOKEN=${COGNITOFORGE_GITHUB_TOKEN}
      - COGNITOFORGE_ALLOWED_ORIGINS=${COGNITOFORGE_ALLOWED_ORIGINS}
    volumes:
      - api_data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  api_data:
    driver: local
