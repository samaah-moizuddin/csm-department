{% extends 'base.html' %}

{% block content %}
<style>
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
    }

    .login-card {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
    }

    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-header h2 {
        color: var(--accent);
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .btn-full {
        width: 100%;
        margin-top: 1rem;
    }
</style>

<div class="login-container">
    <div class="dark-card login-card">
        <div class="login-header">
            <h2><i class="fa-solid fa-lock"></i> Admin Login</h2>
        </div>
        
        <form action="{% url 'AdminLoginCheck' %}" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="adminid">Admin ID</label>
                <input type="text" name="loginid" id="adminid" class="form-control" required placeholder="Enter admin ID">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" required placeholder="Enter password">
            </div>
            
            <button type="submit" class="btn-primary btn-full">Login</button>
        </form>
    </div>
</div>
{% endblock %}
