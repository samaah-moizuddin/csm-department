{% extends 'base.html' %}
{% load static %}

{% block title %}User Login{% endblock %}
{% block user_login %}active{% endblock %}

{% block content %}
<style>
    /* Login Card Styling */
    .login-card {
        background: rgba(20, 30, 60, 0.9);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 3rem;
        margin: 60px auto;
        max-width: 550px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(0, 255, 255, 0.2);
        border: 1px solid rgba(0, 255, 255, 0.3);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        font-family: 'Roboto Mono', monospace;
        color: #e0e0e0;
        position: relative;
        overflow: hidden;
    }
    .login-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(45deg, rgba(0, 255, 255, 0.1), rgba(0, 255, 153, 0.1));
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: -1;
    }
    .login-card:hover::before {
        opacity: 1;
    }
    .login-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 255, 255, 0.4);
    }
    .login-card h2 {
        font-family: 'Montserrat', sans-serif;
        font-size: 2.2rem;
        color: #00f7ff;
        text-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
        margin-bottom: 2rem;
        animation: glowText 2s ease-in-out infinite alternate;
    }
    @keyframes glowText {
        from { text-shadow: 0 0 10px rgba(0, 255, 255, 0.5), 0 0 20px rgba(0, 255, 255, 0.3); }
        to { text-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 0 30px rgba(0, 255, 255, 0.5); }
    }
    .form-control {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(0, 255, 255, 0.4);
        color: #e0e0e0;
        border-radius: 10px;
        padding: 0.85rem;
        font-family: 'Roboto Mono', monospace;
        font-size: 1rem;
        transition: all 0.3s ease;
    }
    .form-control:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: #00ff99;
        box-shadow: 0 0 15px rgba(0, 255, 153, 0.5);
        color: #e0e0e0;
        outline: none;
    }
    .form-control::placeholder {
        color: rgba(176, 196, 222, 0.7);
        font-family: 'Roboto Mono', monospace;
    }
    .form-label {
        color: #b0c4de;
        font-weight: 500;
        font-size: 1.1rem;
        font-family: 'Roboto Mono', monospace;
        margin-bottom: 0.5rem;
        text-shadow: 0 0 5px rgba(0, 255, 255, 0.3);
    }
    .btn-primary {
        background: linear-gradient(45deg, #00b7eb, #00ff99);
        border: none;
        padding: 0.85rem 2.5rem;
        border-radius: 50px;
        font-weight: 600;
        font-family: 'Montserrat', sans-serif;
        color: #1e1e2f;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
        animation: pulseButton 2s infinite;
    }
    @keyframes pulseButton {
        0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); }
        70% { box-shadow: 0 0 0 15px rgba(0, 255, 255, 0); }
        100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); }
    }
    .btn-primary:hover {
        background: linear-gradient(45deg, #0099cc, #00cc88);
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0, 255, 153, 0.6);
        animation: none;
    }
    .btn-outline-dark {
        color: #b0c4de;
        border-color: #00f7ff;
        border-radius: 50px;
        padding: 0.85rem 2.5rem;
        font-family: 'Montserrat', sans-serif;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
    }
    .btn-outline-dark:hover {
        background: rgba(0, 255, 255, 0.2);
        color: #00ff99;
        box-shadow: 0 0 15px rgba(0, 255, 153, 0.5);
        border-color: #00ff99;
    }
    .text-primary {
        color: #00f7ff !important;
        text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
    }
    .message-text {
        font-family: 'Roboto Mono', monospace;
        font-size: 1rem;
        margin-top: 1rem;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        background: rgba(0, 255, 255, 0.1);
        border: 1px solid rgba(0, 255, 255, 0.3);
    }
    @media (max-width: 768px) {
        .login-card {
            margin: 30px 15px;
            padding: 2rem;
            border-radius: 15px;
        }
        .login-card h2 {
            font-size: 1.8rem;
        }
        .form-control {
            padding: 0.7rem;
            font-size: 0.9rem;
        }
        .form-label {
            font-size: 1rem;
        }
        .btn-primary, .btn-outline-dark {
            padding: 0.7rem 2rem;
            font-size: 0.9rem;
        }
    }
</style>
<div class="login-card" data-tilt data-tilt-max="10" data-tilt-speed="400" data-tilt-perspective="1000">
    <h2 class="text-center">User Login</h2>
    <form action="{% url 'UserLoginCheck' %}" method="POST" class="text-primary">
        {% csrf_token %}
        <div class="mb-4">
            <label for="loginname" class="form-label">Login ID</label>
            <input type="text" class="form-control" id="loginname" name="loginname" required
                   placeholder="Enter Login ID">
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="pswd" required
                   placeholder="Enter Password">
        </div>
        <div class="d-flex justify-content-center gap-4 mb-3">
            <button type="submit" class="btn btn-primary">Submit</button>
            <button type="reset" class="btn btn-outline-dark">Reset</button>
        </div>
        {% if messages %}
            {% for message in messages %}
                <p class="text-center message-text text-primary">{{ message }}</p>
            {% endfor %}
        {% endif %}
    </form>
</div>

<!-- Vanilla Tilt.js for 3D tilt effect -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
<script>
    // Initialize Vanilla Tilt
    VanillaTilt.init(document.querySelector(".login-card"), {
        max: 10,
        speed: 400,
        perspective: 1000,
        glare: true,
        "max-glare": 0.3
    });
</script>
{% endblock %}
