{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Classification</title>

<link rel="icon" href="{% static 'images/qr_favicon.png' %}">

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* Global */

body{
font-family:'Roboto Mono', monospace;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

/* Navbar */

.navbar{
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
}

.navbar-brand{
font-weight:700;
font-size:22px;
}

.nav-link{
color:white !important;
margin-left:10px;
}

.nav-link:hover{
color:#00d9ff !important;
}

/* Content */

.content-box{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:15px;
margin-top:40px;
}

/* Buttons */

.btn-main{
background:linear-gradient(45deg,#00c6ff,#0072ff);
border:none;
color:white;
}

.btn-main:hover{
background:linear-gradient(45deg,#0072ff,#00c6ff);
}

/* Footer */

footer{
margin-top:60px;
background:black;
padding:15px;
text-align:center;
}

</style>

</head>


<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="{% url 'UserHome' %}">
<i class="bi bi-qr-code"></i> QR Classification
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">

<span class="navbar-toggler-icon"></span>

</button>


<div class="collapse navbar-collapse justify-content-end" id="nav">

<ul class="navbar-nav">

<li class="nav-item">
<a class="nav-link" href="{% url 'UserHome' %}">
<i class="bi bi-house"></i> Home
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'DatasetView' %}">
<i class="bi bi-database"></i> Dataset
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'training' %}">
<i class="bi bi-cpu"></i> Training
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'prediction' %}">
<i class="bi bi-search"></i> Predict
</a>
</li>

<li class="nav-item">
<a class="nav-link text-danger" href="{% url 'index' %}">
<i class="bi bi-box-arrow-right"></i> Logout
</a>
</li>

</ul>

</div>

</div>

</nav>



<!-- Main Content -->

<div class="container">

<div class="content-box">

{% block content %}
{% endblock %}

</div>

</div>



<!-- Footer -->

<footer>

<p>© 2025 QR Classification</p>

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
